name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Code Style ───────────────────────────────────────────────────────────────
  pint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint (dry-run)
        run: composer pint:test

  # ── Static Analysis ───────────────────────────────────────────────────────────
  phpstan:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer stan

  # ── Tests ─────────────────────────────────────────────────────────────────────
  tests:
    name: "Tests – PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
        laravel: ["10", "11", "12"]
        include:
          - laravel: "10"
            testbench: "^8.0"
          - laravel: "11"
            testbench: "^9.0"
          - laravel: "12"
            testbench: "^10.0"
        exclude:
          # Laravel 11+ requires PHP 8.2+
          - php: "8.1"
            laravel: "11"
          - php: "8.1"
            laravel: "12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Require Laravel ${{ matrix.laravel }} + matching Testbench
        run: |
          composer require \
            "illuminate/support:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pest tests
        run: composer test
