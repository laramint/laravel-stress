name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Code Style ───────────────────────────────────────────────────────────────
  pint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint (dry-run)
        run: composer pint:test

  # ── Static Analysis ───────────────────────────────────────────────────────────
  phpstan:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer stan

  # ── Tests ─────────────────────────────────────────────────────────────────────
  tests:
    name: "Tests – PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 9 & 10 — Pest 2 (Pest 3 → collision 8 → needs Laravel 11+)
          # pest <2.33: avoids brianium/paratest which requires PHP 8.2+
          # phpunit <10.5.63: avoids explicit conflict declared in pest 2.0.1
          - php: "8.1"
            laravel: "9"
            testbench: "^7.0"
            pest: "^2.0 <2.33"
            phpunit: "^10.5.0 <10.5.63"
          - php: "8.1"
            laravel: "10"
            testbench: "^8.0"
            pest: "^2.0 <2.33"
            phpunit: "^10.5.0 <10.5.63"
          # Laravel 11 & 12 — Pest 3
          - php: "8.2"
            laravel: "11"
            testbench: "^9.0"
            pest: "^3.0"
          - php: "8.3"
            laravel: "11"
            testbench: "^9.0"
            pest: "^3.0"
          - php: "8.2"
            laravel: "12"
            testbench: "^10.0"
            pest: "^3.0"
          - php: "8.3"
            laravel: "12"
            testbench: "^10.0"
            pest: "^3.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none

      - name: Remove dev tools not needed for test runs (PHP 8.2+ only)
        run: composer remove larastan/larastan laravel/pint --dev --no-update

      - name: Install dependencies
        run: |
          PHPUNIT_ARGS=()
          [ -n "${{ matrix.phpunit }}" ] && PHPUNIT_ARGS=(--with "phpunit/phpunit:${{ matrix.phpunit }}")
          composer update \
            --with "illuminate/support:^${{ matrix.laravel }}.0" \
            --with "orchestra/testbench:${{ matrix.testbench }}" \
            --with "pestphp/pest:${{ matrix.pest }}" \
            "${PHPUNIT_ARGS[@]}" \
            --prefer-dist --no-interaction --no-progress

      - name: Run Pest tests
        run: composer test
